services:
  - type: web
    name: rt-idps-dashboard
    env: python
    pythonVersion: 3.11
    plan: free
    buildCommand: pip install --no-cache-dir --prefer-binary -r requirements.txt
    startCommand: gunicorn dashboard.app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    autoDeploy: true
